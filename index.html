<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="Build-a-Jam helps improv performers find and organize exercises for practice sessions."
    />
    <meta property="og:title" content="Build-a-Jam" />
    <meta property="og:description" content="Find and organize improv exercises for practice sessions." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://build-a-jam.app/pwa-512x512.png" />
    <meta property="og:url" content="https://build-a-jam.app/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:image" content="https://build-a-jam.app/pwa-512x512.png" />
    <title>Build-a-Jam</title>
    <!-- Prevent theme flash: apply saved preference before first paint -->
    <script>
      (function () {
        var theme = localStorage.getItem('build-a-jam-theme');
        if (theme === 'light') {
          document.documentElement.classList.remove('dark');
        } else if (!theme && window.matchMedia('(prefers-color-scheme: light)').matches) {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
